<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f5f5f5;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
        }

        .new-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
        }

        .new-btn:hover {
            background: #45a049;
        }

        .note-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        .note-item:hover {
            background: #e9e9e9;
        }

        .note-info {
            flex: 1;
        }

        .note-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .note-description {
            font-size: 14px;
            color: #666;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            opacity: 0;
        }

        .note-item:hover .delete-btn {
            opacity: 1;
        }

        .empty-message {
            text-align: center;
            color: #999;
            margin-top: 60px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>My Notes</h1>
        <a href="new-note.html" class="new-btn">+ New Note</a>
    </div>

    <div id="notes-list"></div>

    <script>
        async function loadNotes() {
            const response = await fetch('/notes');
            const notes = await response.json();

            const list = document.getElementById('notes-list');

            if (notes.length === 0) {
                list.innerHTML = '<p class="empty-message">No notes yet. Create your first one!</p>';
                return;
            }

            list.innerHTML = '';
            notes.forEach(note => {
                const item = document.createElement('div');
                item.className = 'note-item';
                item.innerHTML = `
                    <div class="note-info" onclick="window.location='note.html?id=${note.id}'">
                        <div class="note-title">${note.title}</div>
                        <div class="note-description">${note.description}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteNote('${note.id}')">Delete</button>
                `;
                list.appendChild(item);
            });
        }

        async function deleteNote(id) {
            await fetch('/notes/' + id, { method: 'DELETE' });
            loadNotes();
        }

        loadNotes();
    </script>
</body>
</html>
