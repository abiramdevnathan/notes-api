<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
            background: #e8f0fe;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 16px;
            color: #666;
            cursor: pointer;
            margin-bottom: 20px;
            padding: 0;
        }

        .back-btn:hover {
            color: #333;
        }

        .note-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .note-description {
            font-size: 16px;
            color: #666;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #ddd;
        }

        .note-body {
            font-size: 16px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .note-date {
            font-size: 12px;
            color: #999;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.location='index.html'">← Back</button>

    <div class="note-title" id="title"></div>
    <div class="note-description" id="description"></div>
    <div class="note-body" id="body"></div>
    <div class="note-date" id="date"></div>

    <script>
        async function loadNote() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            const response = await fetch('/notes/' + id);
            const note = await response.json();

            document.getElementById('title').textContent = note.title;
            document.getElementById('description').textContent = note.description;
            document.getElementById('body').textContent = note.body;
            document.getElementById('date').textContent = 'Created: ' + new Date(note.createdAt).toLocaleString();
        }

        loadNote();
    </script>
</body>
</html>
